# CPC — Controle Pessoal de Cálculos e Recebimentos

## Versão sem dependências extras

Esta versão foi preparada para Streamlit Community Cloud sem `requirements.txt`, `runtime.txt`, pandas, plotly, reportlab ou openpyxl.

O Streamlit Community Cloud já traz o próprio Streamlit por padrão. Portanto, a publicação não deve tentar instalar bibliotecas adicionais.

## Arquivos a enviar ao GitHub

Envie apenas:

- `app.py`
- `.streamlit/`
- `assets/`
- `data/`
- `README.md`

**Não envie `requirements.txt` ou `runtime.txt`.**
